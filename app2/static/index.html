<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Chunker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Text Chunker</h1>
            <p class="subtitle">View your document split into chunks</p>
        </header>

        <div class="controls">
            <button id="loadBtn" class="btn btn-primary">Load Chunks</button>
            <span id="stats" class="stats"></span>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading chunks...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="chunksContainer" class="chunks-grid">
            <!-- Chunks will be populated here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
